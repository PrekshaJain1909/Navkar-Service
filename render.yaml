services:
  - type: web
    name: chacha-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start --workspace Frontend
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://navkar-service.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: chacha-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace Backend
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
